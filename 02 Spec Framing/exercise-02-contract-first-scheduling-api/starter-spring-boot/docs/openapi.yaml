openapi: 3.1.0
info:
  title: Scheduling Contract
  version: 0.1.0
paths:
  /api/scheduling/slots:
    get:
      summary: List available appointment slots
      responses:
        "200":
          description: Available slots
  /api/scheduling/holds:
    post:
      summary: Create a temporary booking hold
      responses:
        "201":
          description: Hold created
        "400":
          description: Validation error
        "409":
          description: Slot conflict
